<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke的旅遊博客 - 我的個人網站</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">我的網站</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
                        <li class="nav-item"><a class="nav-link" href="resume.html">簡歷</a></li>
                        <li class="nav-item"><a class="nav-link" href="portfolio.html">作品集</a></li>
                        <li class="nav-item"><a class="nav-link active" href="blog.html">生活分享</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <h1 class="text-center mb-4 animate__animated animate__fadeIn">我的旅遊博客</h1>
                
                <div class="intro-text animate__animated animate__fadeIn animate__delay-1s">
                    <p>歡迎來到我的旅遊博客！這裡記錄了我在世界各地的冒險經歷和美麗風景。讓我們一起探索這個精彩的世界吧！</p>
                </div>
                
                <div class="blog-grid animate__animated animate__fadeIn animate__delay-2s">
                    <!-- 博客文章1 -->
                    <div class="blog-item">
                        <img src="images/travel-1.jpg" alt="日本富士山" class="img-fluid">
                        <h3>日本富士山之旅</h3>
                        <p>在這次難忘的旅程中,我親眼目睹了富士山的壯麗景色。清晨的陽光灑在雪頂上,呈現出令人驚嘆的美景...</p>
                        <a href="#" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#blogModal" data-blog-id="1">閱讀更多</a>
                    </div>

                    <!-- 博客文章2 -->
                    <div class="blog-item">
                        <img src="images/travel-2.jpg" alt="義大利威尼斯" class="img-fluid">
                        <h3>威尼斯水城漫遊</h3>
                        <p>乘坐貢多拉穿梭在威尼斯的運河間,欣賞著兩岸古老的建築,彷彿穿越回了中世紀。這座水上之城的魅力...</p>
                        <a href="#" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#blogModal" data-blog-id="2">閱讀更多</a>
                    </div>

                    <!-- 可以繼續添加更多博客文章 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 博客文章詳情模態框 -->
    <div class="modal fade" id="blogModal" tabindex="-1" aria-labelledby="blogModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="blogModalLabel">博客文章</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="blogModalBody">
                    <!-- 博客文章內容將通過 JavaScript 動態加載 -->
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light mt-5 py-3">
        <div class="container text-center">
            <p>&copy; 2024 Luke Hou. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
