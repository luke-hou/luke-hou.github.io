<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="https://www.luke.ninja">Luke Hou 侯俊嘉個人網站</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

    <main class="container mt-5">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <h1 class="text-center mb-4 animate__animated animate__fadeIn">我的作品集</h1>
                
                <div class="intro-text animate__animated animate__fadeIn animate__delay-1s">
                    <p>歡迎來到我的作品集頁面。這裡展示了我最引以為豪的專案和作品。每一個項目都代表了我在技術和創意上的成長。</p>
                </div>
                
                <div class="portfolio-grid animate__animated animate__fadeIn animate__delay-2s">
                    <!-- 作品項目1 -->
                    <div class="portfolio-item">
                        <h3>專案名稱1</h3>
                        <img src="images/project1-thumbnail.jpg" alt="專案1縮略圖" class="img-fluid">
                        <p>這是專案1的簡短描述。介紹了項目的主要功能和使用的技術。</p>
                        <a href="#" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal" data-project-id="1">查看詳情</a>
                    </div>

                    <!-- 作品項目2 -->
                    <div class="portfolio-item">
                        <h3>專案名稱2</h3>
                        <img src="images/project2-thumbnail.jpg" alt="專案2縮略圖" class="img-fluid">

                </div>
            </div>

    <!-- 項目詳情模態框 -->
    <div class="modal fade" id="projectModal" tabindex="-1" aria-labelledby="projectModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="projectModalLabel">項目詳情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
